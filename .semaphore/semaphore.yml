---
version: v1.0
name: Pipeline
agent:
  machine:
    type: f1-standard-2

auto_cancel:
  queued:
    when: "true"
fail_fast:
  stop:
    when: "true"

global_job_config:
  prologue:
    commands_file: commands/set_vars_and_checkout.sh

blocks:
  - name: Test
    dependencies: []
    task:
      secrets:
        - name: artifacts
      jobs:
        - name: Terraform
          commands:
            - wait

            - cd "${REPO_NAME}"

            - docker run --pull=always -e "USERID=$(id -u):$(id -g)" -v $(pwd):/lint -w /lint ghcr.io/antonbabenko/pre-commit-terraform:latest run --all-files

            # Run terraform test for modules that have .tftest.hcl files
            - |
              for dir in $(find . -name "*.tftest.hcl" -exec dirname {} \; | sed 's|/tests$||' | sort -u); do
                echo "Running terraform test in $dir"
                docker run --rm -e "USERID=$(id -u):$(id -g)" -v $(pwd):/lint -w /lint/$dir hashicorp/terraform:latest sh -c "terraform init -upgrade -backend=false && terraform test"
              done
